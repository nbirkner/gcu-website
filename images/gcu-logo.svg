<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Front face color -->
    <linearGradient id="front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A87A"/>
      <stop offset="100%" stop-color="#C49468"/>
    </linearGradient>
    <!-- Left side (shadow) -->
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8764A"/>
      <stop offset="100%" stop-color="#926540"/>
    </linearGradient>
    <!-- Top face -->
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C49468"/>
      <stop offset="100%" stop-color="#DABB98"/>
    </linearGradient>
    <!-- Base shelf -->
    <linearGradient id="baseFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CDAA82"/>
      <stop offset="100%" stop-color="#BFA078"/>
    </linearGradient>
    <linearGradient id="baseTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#BFA078"/>
      <stop offset="100%" stop-color="#DABB98"/>
    </linearGradient>
  </defs>

  <g transform="translate(250, 250)">
    <!--
      Faithful recreation of img-000.jpg:
      3 nested rectangular U-shaped gateway frames with 3D depth,
      sitting on a horizontal base/shelf.
      Viewed from slightly lower-left, showing top and left-side depth.
    -->

    <!-- ==================== -->
    <!-- OUTER FRAME (largest, tallest) -->
    <!-- ==================== -->
    <!-- Left pillar - front face -->
    <rect x="-155" y="-155" width="28" height="310" fill="url(#front)"/>
    <!-- Left pillar - left side (3D depth) -->
    <polygon points="-155,-155 -171,-170 -171,140 -155,155" fill="url(#side)"/>
    <!-- Left pillar - top face -->
    <polygon points="-155,-155 -171,-170 -143,-170 -127,-155" fill="url(#top)"/>

    <!-- Right pillar - front face -->
    <rect x="127" y="-155" width="28" height="310" fill="url(#front)"/>
    <!-- Right pillar - left side (3D depth) -->
    <polygon points="127,-155 111,-170 111,140 127,155" fill="url(#side)"/>
    <!-- Right pillar - top face -->
    <polygon points="127,-155 111,-170 139,-170 155,-155" fill="url(#top)"/>

    <!-- Top crossbar - front face -->
    <rect x="-155" y="-155" width="310" height="28" fill="url(#front)"/>
    <!-- Top crossbar - top face -->
    <polygon points="-155,-155 -171,-170 139,-170 155,-155" fill="url(#top)"/>
    <!-- Top crossbar - left side -->
    <polygon points="-155,-155 -171,-170 -171,-142 -155,-127" fill="url(#side)"/>

    <!-- ==================== -->
    <!-- MIDDLE FRAME -->
    <!-- ==================== -->
    <!-- Left pillar - front face -->
    <rect x="-95" y="-85" width="26" height="240" fill="url(#front)"/>
    <!-- Left pillar - left side -->
    <polygon points="-95,-85 -110,-100 -110,140 -95,155" fill="url(#side)"/>
    <!-- Left pillar - top face -->
    <polygon points="-95,-85 -110,-100 -84,-100 -69,-85" fill="url(#top)"/>

    <!-- Right pillar - front face -->
    <rect x="69" y="-85" width="26" height="240" fill="url(#front)"/>
    <!-- Right pillar - left side -->
    <polygon points="69,-85 54,-100 54,140 69,155" fill="url(#side)"/>
    <!-- Right pillar - top face -->
    <polygon points="69,-85 54,-100 80,-100 95,-85" fill="url(#top)"/>

    <!-- Top crossbar - front face -->
    <rect x="-95" y="-85" width="190" height="26" fill="url(#front)"/>
    <!-- Top crossbar - top face -->
    <polygon points="-95,-85 -110,-100 80,-100 95,-85" fill="url(#top)"/>
    <!-- Top crossbar - left side -->
    <polygon points="-95,-85 -110,-100 -110,-74 -95,-59" fill="url(#side)"/>

    <!-- ==================== -->
    <!-- INNER FRAME (smallest) -->
    <!-- ==================== -->
    <!-- Left pillar - front face -->
    <rect x="-40" y="-20" width="24" height="175" fill="url(#front)"/>
    <!-- Left pillar - left side -->
    <polygon points="-40,-20 -54,-34 -54,141 -40,155" fill="url(#side)"/>
    <!-- Left pillar - top face -->
    <polygon points="-40,-20 -54,-34 -30,-34 -16,-20" fill="url(#top)"/>

    <!-- Right pillar - front face -->
    <rect x="16" y="-20" width="24" height="175" fill="url(#front)"/>
    <!-- Right pillar - left side -->
    <polygon points="16,-20 2,-34 2,141 16,155" fill="url(#side)"/>
    <!-- Right pillar - top face -->
    <polygon points="16,-20 2,-34 26,-34 40,-20" fill="url(#top)"/>

    <!-- Top crossbar - front face -->
    <rect x="-40" y="-20" width="80" height="24" fill="url(#front)"/>
    <!-- Top crossbar - top face -->
    <polygon points="-40,-20 -54,-34 26,-34 40,-20" fill="url(#top)"/>
    <!-- Top crossbar - left side -->
    <polygon points="-40,-20 -54,-34 -54,-10 -40,4" fill="url(#side)"/>

    <!-- ==================== -->
    <!-- BASE / SHELF -->
    <!-- ==================== -->
    <!-- Front face -->
    <rect x="-175" y="155" width="370" height="14" fill="url(#baseFront)"/>
    <!-- Top face -->
    <polygon points="-175,155 -190,142 195,142 195,155" fill="url(#baseTop)"/>
    <!-- Left side -->
    <polygon points="-175,155 -190,142 -190,154 -175,169" fill="url(#side)"/>
  </g>
</svg>